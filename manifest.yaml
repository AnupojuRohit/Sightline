display_information:
  name: Sightline
  description: Evidence-backed Slack List status agent for engineering teams.
  background_color: "#1f8a5b"
features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: false
    messages_tab_read_only_enabled: true
oauth_config:
  redirect_urls:
    - ${SLACK_OAUTH_REDIRECT_URI}
  scopes:
    bot:
      - app_home:read
      - chat:write
    user:
      - search:read
settings:
  event_subscriptions:
    bot_events:
      - app_context_changed
      - app_home_opened
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
